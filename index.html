<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVP STEAM CLUB - SLC Aventura</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.react = window.React;
        window.reactDOM = window.ReactDOM;
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                        outfit: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfe; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        pre, code { font-family: 'JetBrains Mono', monospace; }
        .nav-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { 
            Cpu, Zap, Eye, Move, Save, Settings, Trophy, Code, Info, Layout, CheckCircle, RefreshCw, Battery, ChevronRight 
        } = window.LucideReact || {};

        const Nav = ({ activePage }) => {
          const links = [
            { id: 'index.html', label: 'SL 3 Sensores', icon: Cpu },
            { id: 'placeholder.html', label: 'Guía Placeholder', icon: Layout },
          ];

          return (
            <nav className="sticky top-0 z-50 nav-glass">
              <div className="max-w-7xl mx-auto px-6">
                <div className="flex items-center justify-between h-16">
                  <div className="flex items-center gap-2">
                    <div className="bg-blue-600 w-8 h-8 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-100">
                      <Zap size={18} fill="currentColor" />
                    </div>
                    <span className="font-outfit font-black text-slate-900 tracking-tighter">SVP STEAM</span>
                  </div>
                  <div className="flex items-center gap-1 md:gap-4">
                    {links.map((link) => (
                      <a key={link.id} href={link.id} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 ${activePage === link.id ? 'bg-blue-50 text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-900 hover:bg-slate-50'}`}>
                        <link.icon size={16} />
                        <span className="hidden md:inline">{link.label}</span>
                      </a>
                    ))}
                  </div>
                </div>
              </div>
            </nav>
          );
        };

        const highlightArduino = (code) => {
          if (!code) return '';
          let text = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          const tokens = [];
          text = text.replace(/(\/\/.*)|("(.*?)")/g, (match) => {
            const isComment = match.startsWith('//');
            const color = isComment ? '#008000' : '#a31515';
            tokens.push(`<span style="color: ${color};">${match}</span>`);
            return `___TOKEN_${tokens.length - 1}___`;
          });
          text = text.replace(/\b(if|else|void|int|return|for|while|setup|loop)\b/g, '<span style="color: #0000ff;">$1</span>');
          text = text.replace(/\b(pinMode|digitalRead|analogWrite|Serial|begin|print|println|delay|HIGH|LOW|INPUT|OUTPUT)\b/g, '<span style="color: #267f99;">$1</span>');
          text = text.replace(/\b(\d+)\b/g, '<span style="color: #098658;">$1</span>');
          text = text.replace(/___TOKEN_(\d+)___/g, (match, index) => tokens[parseInt(index)]);
          return <code dangerouslySetInnerHTML={{ __html: text }} />;
        };

        const CodeBlock = ({ code }) => (
          <div className="bg-[#fffffe] border border-slate-300 rounded-lg shadow-sm overflow-hidden h-full flex flex-col font-mono text-[13px]">
            <div className="bg-[#f3f3f3] px-4 py-2 border-b border-slate-200 flex justify-between items-center">
              <div className="flex gap-1.5">
                <div className="w-3 h-3 rounded-full bg-slate-300"></div><div className="w-3 h-3 rounded-full bg-slate-300"></div><div className="w-3 h-3 rounded-full bg-slate-300"></div>
              </div>
              <span className="text-slate-400 text-[10px] font-bold tracking-widest uppercase">Arduino Editor</span>
            </div>
            <div className="p-6 overflow-x-auto leading-relaxed bg-white h-full">
              <pre className="whitespace-pre">{highlightArduino(code)}</pre>
            </div>
          </div>
        );

        const Step = ({ icon: Icon, title, explanation, code, isLast, subtitle }) => (
          <div className={`flex flex-col lg:flex-row gap-10 mb-20 pb-16 ${!isLast ? 'border-b border-slate-100' : ''}`}>
            <div className="lg:w-1/2 order-2 lg:order-1">
              <div className="sticky top-24">
                <div className="flex items-center gap-3 mb-5">
                  <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg shadow-blue-100"><Icon size={22} /></div>
                  <div>
                    <span className="text-blue-500 font-bold text-[10px] uppercase tracking-[0.2em]">{subtitle}</span>
                    <h2 className="text-2xl font-black text-slate-800 leading-tight">{title}</h2>
                  </div>
                </div>
                <div className="text-slate-600 leading-relaxed space-y-4 text-[15px]">{explanation}</div>
              </div>
            </div>
            <div className="lg:w-1/2 order-1 lg:order-2">
              <div className="flex items-center gap-2 mb-3 text-slate-400 font-bold text-[10px] uppercase tracking-widest ml-1"><Code size={14} /> Código Completo</div>
              <CodeBlock code={code} />
            </div>
          </div>
        );

        const App = () => (
          <div className="min-h-screen bg-[#fcfdfe] font-sans text-slate-900">
            <Nav activePage="index.html" />
            <header className="bg-white border-b border-slate-200 py-24 px-6">
              <div className="max-w-7xl mx-auto text-center lg:text-left">
                <div className="flex items-center justify-center lg:justify-start gap-2 text-blue-600 font-bold text-xs uppercase tracking-[0.3em] mb-4">
                  <span className="w-8 h-[2px] bg-blue-600"></span>SVP STEAM CLUB
                </div>
                <h1 className="text-5xl md:text-7xl font-black text-slate-900 mb-8 tracking-tighter leading-none">
                  <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-500">SLC Aventura 3 sensores</span>
                </h1>
                <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-8 max-w-4xl mx-auto lg:mx-0 text-left">
                  <p className="text-blue-800 text-sm leading-relaxed"><strong>Nota importante:</strong> Esta guía es para programar un robot con 3 sensores, pero es la misma idea para cualquier número de sensores.</p>
                </div>
              </div>
            </header>

            <main className="max-w-7xl mx-auto px-6 py-20">
              <Step subtitle="Paso 1" icon={Settings} title="Configurando el Setup" explanation={<p>Todo programa de Arduino comienza con el <code>void setup()</code>.</p>} code={`void setup() {\n  pinMode(5, OUTPUT); pinMode(6, OUTPUT);\n  pinMode(9, OUTPUT); pinMode(10, OUTPUT);\n  pinMode(2, INPUT);  pinMode(3, INPUT);  pinMode(4, INPUT);\n  Serial.begin(9600);\n}`} />
              
              <Step subtitle="Paso 2" icon={Move} title="¡A mover los motores!" explanation={<p>Imagina que cada motor de tu robot es un motorcito normal con dos cables sueltos.</p>} code={`void loop() {\n  analogWrite(5, 100); analogWrite(6, 0);\n  analogWrite(9, 100); analogWrite(10, 0);\n}`} />

              <Step subtitle="Paso 3" icon={Eye} title="Leyendo la pista" explanation={<p>El comando <code>digitalRead(pin)</code> lee el sensor.</p>} code={`void loop() {\n  Serial.print("Izq: ");   Serial.print(digitalRead(2));\n  Serial.print(" | Centro: "); Serial.print(digitalRead(3));\n  Serial.print(" | Der: ");   Serial.println(digitalRead(4));\n  delay(100); \n}`} />

              <Step subtitle="Paso 4" icon={Zap} title="La primera decisión (if)" explanation={<p>Unimos lectura y movimiento.</p>} code={`void loop() {\n  if (digitalRead(3)) {\n    analogWrite(5, 100); analogWrite(6, 0);\n    analogWrite(9, 100); analogWrite(10, 0);\n  } else {\n    analogWrite(5, 0); analogWrite(6, 0);\n  }\n}`} />

              <Step subtitle="Paso 5" icon={Layout} title="Corrigiendo con else if" explanation={<p>El <code>else if</code> significa "si no pasó lo anterior, intenta esto".</p>} code={`void loop() {\n  if (digitalRead(3)) { /* Recto */ }\n  else if (digitalRead(2)) { /* Izq */ }\n  else if (digitalRead(4)) { /* Der */ }\n}`} />

              <Step subtitle="Paso 6" icon={Save} title="Variables e Inteligencia" explanation={<p>Para no cambiar números uno por uno, usamos Variables.</p>} code={`int vel = 230;\nint velinv = 80;\n\nvoid loop() {\n  if (digitalRead(3)) {\n    analogWrite(5, vel); analogWrite(6, 0);\n    analogWrite(9, vel); analogWrite(10, 0);\n  }\n}`} isLast={true} />
            </main>

            <footer className="bg-white border-t border-slate-200 py-12 text-center text-slate-400 font-bold tracking-widest text-[10px] uppercase">
              SVP STEAM CLUB
            </footer>
          </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
