<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVP Steam Club - Contenido</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.284.0"></script>
    <script src="https://unpkg.com/lucide-react@0.284.0"></script>
    <script src="content.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                },
            },
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Acceso robusto a LucideReact
        const Lucide = window.LucideReact || window.lucideReact || {};

        const Icon = ({ name, size = 24, ...props }) => {
            const IconComponent = Lucide[name];
            if (!IconComponent) {
                return <div style={{ width: size, height: size }} {...props}></div>;
            }
            return <IconComponent size={size} {...props} />;
        };

        const { 
            Zap, Settings, Move, Trophy, Cpu, Code, Info, Layout, CheckCircle, RefreshCw, ChevronLeft, ChevronRight, Search, Menu, X
        } = Lucide;

        const Nav = ({ onGoHome, courseTitle, classTitle }) => (
            <nav className="sticky top-0 z-50 nav-glass">
                <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                    <div 
                        className="flex items-center gap-2 cursor-pointer group"
                        onClick={onGoHome}
                    >
                        <div className="bg-blue-600 w-8 h-8 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-200 group-hover:scale-110 transition-transform">
                            <Zap size={18} fill="currentColor" />
                        </div>
                        <div className="flex flex-col">
                            <span className="font-outfit font-black text-slate-900 tracking-tighter leading-none">SVP STEAM</span>
                            <span className="text-[10px] font-bold text-blue-600 tracking-widest uppercase">Club</span>
                        </div>
                    </div>

                    {courseTitle && (
                        <div className="hidden md:flex items-center gap-2 text-sm font-medium text-slate-500">
                            <ChevronRight size={16} />
                            <span className="text-slate-900 font-bold">{courseTitle}</span>
                            {classTitle && (
                                <>
                                    <ChevronRight size={16} />
                                    <span className="text-blue-600 font-bold">{classTitle}</span>
                                </>
                            )}
                        </div>
                    )}

                    <div>
                        <button className="md:hidden p-2 text-slate-500">
                            <Menu size={20} />
                        </button>
                    </div>
                </div>
            </nav>
        );

        const highlightArduino = (code) => {
          if (!code) return '';
          let text = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          const tokens = [];
          text = text.replace(/(\/\/.*)|("(.*?)")/g, (match) => {
            const isComment = match.startsWith('//');
            const color = isComment ? '#00b894' : '#d63031';
            tokens.push(`<span style="color: ${color};">${match}</span>`);
            return `___TOKEN_${tokens.length - 1}___`;
          });
          const keywords = /\b(if|else|void|int|return|for|while|setup|loop)\b/g;
          text = text.replace(keywords, '<span style="color: #0984e3;">$1</span>');
          const arduinoTerms = /\b(pinMode|digitalRead|analogWrite|Serial|begin|print|println|delay|HIGH|LOW|INPUT|OUTPUT)\b/g;
          text = text.replace(arduinoTerms, '<span style="color: #6c5ce7;">$1</span>');
          const numbers = /\b(\d+)\b/g;
          text = text.replace(numbers, '<span style="color: #e67e22;">$1</span>');
          text = text.replace(/___TOKEN_(\d+)___/g, (match, index) => tokens[parseInt(index)]);
          return <code dangerouslySetInnerHTML={{ __html: text }} />;
        };

        const CodeBlock = ({ code }) => (
          <div className="bg-[#f8fafc] border border-slate-200 rounded-xl overflow-hidden shadow-sm font-mono text-[13px]">
            <div className="bg-slate-100 px-4 py-2 border-b border-slate-200 flex justify-between items-center">
              <div className="flex gap-1.5">
                <div className="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                <div className="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                <div className="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
              </div>
              <span className="text-slate-400 text-[9px] font-bold tracking-widest uppercase">Arduino Code</span>
            </div>
            <div className="p-5 overflow-x-auto leading-relaxed">
              <pre className="whitespace-pre">{highlightArduino(code)}</pre>
            </div>
          </div>
        );

        const LandingPage = ({ courses, onSelectCourse }) => (
            <div className="fade-in max-w-7xl mx-auto px-6 py-12 md:py-20">
                <header className="mb-16 text-center md:text-left">
                    <h1 className="text-5xl md:text-7xl font-black text-slate-900 mb-6 tracking-tighter leading-none">
                        SVP STEAM Club<br />
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-500">
                            Enciclopedia de Contenido
                        </span>
                    </h1>
                    <p className="text-xl text-slate-500 max-w-2xl font-medium">
                        Guías definitivas, tutoriales y recursos para la próxima generación de competidores de robótica.
                    </p>
                </header>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    {courses.map(course => {
                        return (
                            <div 
                                key={course.id}
                                className="card-glass rounded-3xl p-8 cursor-pointer group relative overflow-hidden flex flex-col h-full"
                                onClick={() => onSelectCourse(course)}
                            >
                                <div className={`absolute top-0 right-0 w-32 h-32 -mr-8 -mt-8 bg-${course.color}-500 opacity-[0.03] rounded-full`}></div>
                                <div className={`bg-${course.color}-100 w-14 h-14 rounded-2xl flex items-center justify-center text-${course.color}-600 mb-6 group-hover:scale-110 transition-transform`}>
                                   <Icon name={course.icon} size={28} />
                                </div>
                                <h3 className="text-2xl font-black text-slate-800 mb-4 group-hover:text-blue-600 transition-colors">{course.title}</h3>
                                <p className="text-slate-500 mb-8 font-medium leading-relaxed">{course.description}</p>
                                <div className="mt-auto flex items-center gap-2 text-sm font-bold text-blue-600">
                                    Ver Curso <ChevronRight size={16} />
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        const CoursePage = ({ course, onSelectClass, onGoBack }) => (
            <div className="fade-in max-w-7xl mx-auto px-6 py-12 md:py-20">
                <button 
                    onClick={onGoBack}
                    className="flex items-center gap-2 p-2 -ml-2 text-slate-400 hover:text-blue-600 font-bold text-xs uppercase tracking-widest transition-colors mb-12"
                >
                    <ChevronLeft size={16} /> Volver a cursos
                </button>

                <div className="flex flex-col lg:flex-row gap-16">
                    <div className="lg:w-1/3">
                        <div className={`bg-${course.color}-100 w-16 h-16 rounded-2xl flex items-center justify-center text-${course.color}-600 mb-8`}>
                           <Icon name={course.icon} size={32} />
                        </div>
                        <h2 className="text-4xl md:text-5xl font-black text-slate-900 mb-6 tracking-tight">{course.title}</h2>
                        <p className="text-slate-500 text-lg font-medium leading-relaxed mb-8">{course.description}</p>
                    </div>

                    <div className="lg:w-2/3 space-y-4">
                        <h4 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Clases disponibles</h4>
                        {course.classes.map((cls, index) => (
                            <div 
                                key={cls.id}
                                className="card-glass rounded-2xl p-6 cursor-pointer group flex items-center justify-between"
                                onClick={() => onSelectClass(cls)}
                            >
                                <div className="flex items-center gap-6">
                                    <div className="text-3xl font-black text-slate-100 group-hover:text-blue-50 transition-colors">
                                        {(index + 1).toString().padStart(2, '0')}
                                    </div>
                                    <div>
                                        <p className="text-blue-500 font-bold text-[10px] uppercase tracking-widest mb-1">{cls.subtitle}</p>
                                        <h3 className="text-xl font-bold text-slate-800">{cls.title}</h3>
                                    </div>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-300 group-hover:bg-blue-600 group-hover:text-white transition-all">
                                    <ChevronRight size={20} />
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const ClassPage = ({ classData, onGoBack }) => (
            <div className="fade-in max-w-7xl mx-auto px-6 py-12 md:py-20">
                <button 
                    onClick={onGoBack}
                    className="flex items-center gap-2 p-2 -ml-2 text-slate-400 hover:text-blue-600 font-bold text-xs uppercase tracking-widest transition-colors mb-12"
                >
                    <ChevronLeft size={16} /> Volver al curso
                </button>

                <div className="flex flex-col lg:flex-row gap-16">
                    <div className="lg:w-1/2">
                        <div className="sticky top-24">
                            <div className="flex items-center gap-4 mb-8">
                                <div className="bg-blue-600 p-3 rounded-2xl text-white shadow-xl shadow-blue-100">
                                    <Icon name={classData.icon} size={28} />
                                </div>
                                <div>
                                    <p className="text-blue-600 font-black text-xs uppercase tracking-[0.2em] mb-1">{classData.subtitle}</p>
                                    <h1 className="text-3xl md:text-4xl font-black text-slate-900 tracking-tight leading-tight">{classData.title}</h1>
                                </div>
                            </div>
                            
                            <div 
                                className="explanation-content text-slate-600 text-[16px] leading-relaxed"
                                dangerouslySetInnerHTML={{ __html: classData.explanation }}
                            />
                        </div>
                    </div>

                    <div className="lg:w-1/2">
                        <div className="sticky top-24">
                            <div className="flex items-center justify-between mb-4">
                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                    <Code size={14} /> Código de Arduino
                                </span>
                            </div>
                            <CodeBlock code={classData.code} />
                        </div>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = React.useState('landing'); // landing, course, class
            const [selectedCourse, setSelectedCourse] = React.useState(null);
            const [selectedClass, setSelectedClass] = React.useState(null);

            const handleGoHome = () => {
                setView('landing');
                setSelectedCourse(null);
                setSelectedClass(null);
            };

            const handleSelectCourse = (course) => {
                setSelectedCourse(course);
                setView('course');
            };

            const handleSelectClass = (cls) => {
                setSelectedClass(cls);
                setView('class');
            };

            const handleGoBackToCourse = () => {
                setView('course');
                setSelectedClass(null);
            };

            return (
                <div className="min-h-screen bg-[#fcfdfe] text-slate-900 selection:bg-blue-100 selection:text-blue-700">
                    <Nav 
                        onGoHome={handleGoHome} 
                        courseTitle={selectedCourse?.title}
                        classTitle={selectedClass?.title}
                    />
                    
                    <main>
                        {view === 'landing' && (
                            <LandingPage 
                                courses={appContent.courses} 
                                onSelectCourse={handleSelectCourse} 
                            />
                        )}
                        {view === 'course' && (
                            <CoursePage 
                                course={selectedCourse} 
                                onSelectClass={handleSelectClass}
                                onGoBack={handleGoHome}
                            />
                        )}
                        {view === 'class' && (
                            <ClassPage 
                                classData={selectedClass} 
                                onGoBack={handleGoBackToCourse}
                            />
                        )}
                    </main>

                    <footer className="mt-20 border-t border-slate-100 py-20 text-center">
                        <div className="max-w-7xl mx-auto px-6">
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em] mb-4">SVP Steam Club © 2026</p>
                            <div className="flex justify-center gap-6">
                                <div className="w-10 h-1 rounded-full bg-blue-600"></div>
                                <div className="w-10 h-1 rounded-full bg-slate-200"></div>
                                <div className="w-10 h-1 rounded-full bg-slate-200"></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
